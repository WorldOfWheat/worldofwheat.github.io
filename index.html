<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行列高手</title>
    <link href="css/index.css" rel="stylesheet"/>
    <link href="css/button.css" rel="stylesheet"/>
    <link href="css/tests.css" rel="stylesheet"/>
  </head>
  <body id="body" style="display: none;">
    <!-- Banner -->
    <div class="banner">
      <table align="center" style="width: 100%; height: 100%;">
        <tr>
          <!-- Level 1 -->
          <td class="buttons_table">

            <div class="dropdown" style="z-index: 11;">
              <button class="button">一級簡碼</button>
              <div class="dropdown-list">
                <div class="selection">
                  <input type="checkbox">
                  <label>A</label>
                </div>
                <div class="selection">
                  <input type="checkbox">
                  <label>A</label>
                </div>
                <div class="selection">
                  <input type="checkbox">
                  <label>A</label>
                </div>
              </div>
            </div>

<!--
            <button class="button typeSelectButton" id="level1" disabled 
                    onclick="typeSelect('level1')">
              一級簡碼
            </button>
-->
          </td>

          <!-- Level 2 -->
          <td class="buttons_table">
            <button class="button typeSelectButton" id="level2"
                    onclick="typeSelect('level2')">
              二級簡碼
            </button>
          </td>
          <!-- Special -->
          <td class="buttons_table">
            <button class="button typeSelectButton" id="special"
                    onclick="typeSelect('special')" >
              特別碼
            </button>
          </td>
        </tr>
      </table>
    </div>
    
    <!-- Content -->
    <div class="content" style="z-index: 1;">
      <!-- Ready -->
      <div id="beginning" style="z-index: 4;">
        <button class="button" id="start_button" onclick="startTest()">
          開始
        </button>
      </div>
    
      <!-- Running -->
      <div id="running">
        <div id="tests" >
          <!-- Target Aim -->
          <div id="target" style="z-index: 3;"></div>
          <!-- Tests tray -->
          <div id="tests_tray" style="z-index: 2;"></div>
        </div>
        <!-- Input -->
        <div id="input">
          <input id="input_field" type="text" placeholder="答案">
        </div>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="foster" style="z-index: 5;">
      版本：v1.0
      <a style="float: right;" target="_blank" href="https://github.com/WorldOfWheat/fast-array.github.io">
        <img style="margin-top: 2px; margin-left: 5px;" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20vw">
      </a>
      <span style="float: right;">作者：小麥</span>
    </div>
  </body>
  <script src="js/CSSAnimation.js"></script>
  <script src="js/CodesLoad.js"></script>
  <script src="js/TestContorl.js"></script>
  <script src="js/index.js"></script>
</html>
