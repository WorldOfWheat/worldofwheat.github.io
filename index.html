<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行列高手</title>
    <link href="css/index.css" rel="stylesheet"/>
    <link href="css/button.css" rel="stylesheet"/>
    <link href="css/running.css" rel="stylesheet"/>
    <link href="css/beginning.css" rel="stylesheet"/>
    <link href="css/selection_panel.css" rel="stylesheet"/>
  </head>
  <body id="body" style="display: none;">
    <!-- Banner -->
    <div id="banner" style="z-index: 2;">
      <table align="center" style="width: 100%; height: 100%;">
        <tr>
          <!-- Level 1 -->
          <td class="selection_table">
            <button class="button" onclick="cssAnimation.switchSelections(0)">
              一級簡碼
            </button>
          </td>

          <!-- Level 2 -->
          <td class="selection_table">
            <button class="button" onclick="cssAnimation.switchSelections(1)">
              二級簡碼
            </button>
          </td>

          <!-- Special -->
          <td class="selection_table">
            <button class="button" onclick="cssAnimation.switchSelections(2)">
              特別碼
            </button>
          </td>
        </tr>
      </table>
    </div>
    
    <!-- Context -->
    <div id="context" style="z-index: 1;">
      <!-- Selection Panel -->
      <div id="selection_panel" style="z-index: 3;">
        <!-- 一級簡碼 -->
        <div class="selections" id="0_selections" onmouseleave="cssAnimation.switchSelections(0)">
          <div class="title">
            一級簡碼
          </div>
        </div>
        <!-- 二級簡碼 -->
        <div class="selections" id="1_selections" onmouseleave="cssAnimation.switchSelections(1)">
          <div class="title">
            二級簡碼
          </div>
        </div>
        <!-- 特別碼 -->
        <div class="selections" id="2_selections" onmouseleave="cssAnimation.switchSelections(2)">
          <div class="title">
            特別碼
          </div>
        </div>
      </div>

      <!-- Ready -->
      <!-- TODO -->
      <div id="beginning" style="display: block; z-index: 4;">
        <button class="button" id="start_button" style="z-index: 11;" onclick="startTest()">開始</button>
        <!-- blur mask -->
        <div class="blur_mask"></div>
      </div>
    
      <!-- Running -->
      <div id="running" style="z-index: 3;">
        <div id="code_type">
          一級簡碼
        </div>
        <div id="tests" >
          <!-- Target Aim -->
          <div id="target" style="z-index: 2;"></div>
          <!-- Tests tray -->
          <div id="tests_tray" style="z-index: 1;"></div>
        </div>
        <!-- Input -->
        <input id="input_field" type="text" placeholder="答案">
      </div>
    </div>
    
    <!-- Footer -->
    <div id="foster">
      版本：v1.0
      <a style="float: right;" target="_blank" href="https://github.com/WorldOfWheat/fast-array.github.io">
        <img style="margin-top: 2px; margin-left: 5px;" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20vw">
      </a>
      <span style="float: right;">作者：小麥</span>
    </div>
  </body>
  <script src="js/CSSControl.js"></script>
  <script src="js/CodesLoad.js"></script>
  <script src="js/TestContorl.js"></script>
  <script src="js/index.js"></script>
</html>
